version: '3.9'

services:
  backend:
    build:
      context: .
      dockerfile: server/Dockerfile.backend
    env_file:
      - .env
    environment:
      PORT: 5000
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/code_alchemist}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./server:/app
      - ./server/instance:/app/instance
      - ./server/uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-code_alchemist}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-code_alchemist}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
