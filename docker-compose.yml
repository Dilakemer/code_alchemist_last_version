services:
  backend:
    build:
      context: .
      dockerfile: server/Dockerfile.backend
    ports:
      - "5001:5000"
    environment:
      - PYTHONUNBUFFERED=1
      - PORT=5000
    env_file:
      - .env
    volumes:
      - ./server:/app
      - ./server/instance:/app/instance
#      - ./server/static:/app/static

  frontend:
    build:
      context: ./client
      args:
        - VITE_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
        - VITE_API_BASE=http://localhost:5001
    ports:
      - "80:80"
    depends_on:
      - backend
