services:
  backend:
    build:
      context: .
      dockerfile: server/Dockerfile.backend
    ports:
      - "5000:5000"
    environment:
      - PYTHONUNBUFFERED=1
      - PORT=5000
    env_file:
      - .env
    volumes:
      - ./server:/app
      - ./server/instance:/app/instance
#      - ./server/static:/app/static

  frontend:
    build: ./client
    ports:
      - "80:80"
    depends_on:
      - backend
